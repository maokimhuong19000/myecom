events {
  worker_connections 1024;
}

http {
  resolver 127.0.0.11 valid=30s ipv6=off;
  include /etc/nginx/mime.types;

  server {
    listen 80;
    server_name _;

    client_max_body_size 20M;

    # Uploads (static files)
    location /api/products/catalog/uploads/ {
      alias /app/uploads/;
      expires 30d;
      add_header Cache-Control "public";
    }

    # Auth service
    location /api/auth/ {
      proxy_pass http://authentication-service:8000/;
      proxy_set_header Host $host;
      proxy_set_header X-Real-IP $remote_addr;
      proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    }

    # Product service
    location /api/products/ {
      proxy_pass http://product-service:8001/;
      proxy_set_header Host $host;
      proxy_set_header X-Real-IP $remote_addr;
      proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    }

    # Health checks
    location /health/auth {
      proxy_pass http://authentication-service:8000/health;
    }

    location /health/products {
      proxy_pass http://product-service:8001/health;
    }

    # Frontend (Next.js or similar)
    location / {
      proxy_pass http://ecom:3000;
      proxy_http_version 1.1;

      proxy_set_header Host $host;
      proxy_set_header Upgrade $http_upgrade;
      proxy_set_header Connection "upgrade";
    }
  }
}